<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Chromosome AR — Medical Demo</title>

  <!-- Libraries from CDN -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Loading screen -->
  <div id="loading-screen">
    <div class="dna-spinner">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
    <h1>Loading AR Experience</h1>
    <p id="loading-status">Initializing camera and tracking model…</p>
  </div>

  <!-- Scan instructions -->
  <div id="scan-instructions" class="hidden">
    <div class="scan-frame">
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
    </div>
    <p>Point your camera at the <strong>chromosome "X" model</strong></p>
  </div>

  <!-- Tap-to-start overlay -->
  <div id="start-overlay">
    <div class="start-card">
      <h1>🧬 Chromosome AR</h1>
      <p>Point your camera at the acrylic chromosome model to see the video.</p>
      <button id="start-button">Start AR Experience</button>
      <p class="hint">Please allow camera access when prompted.</p>
    </div>
  </div>

  <!-- Error screen -->
  <div id="error-screen" class="hidden">
    <div class="error-card">
      <h2>⚠️ Something went wrong</h2>
      <p id="error-message"></p>
      <button onclick="location.reload()">Retry</button>
    </div>
  </div>

  <!-- THE AR SCENE -->
  <a-scene
    id="ar-scene"
    mindar-image="
      imageTargetSrc: assets/targets/targets.mind;
      autoStart: false;
      facingMode: environment;
      uiLoading: no;
      uiScanning: no;
      uiError: no;
      filterMinCF: 0.00001;
      filterBeta: 0.001;
      missTolerance: 20;
      warmupTolerance: 2;
    "
    color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights: true, alpha: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-assets>
      <!-- ============================================================
           VIDEO ELEMENT WITH MULTIPLE SOURCES (FALLBACK CHAIN)
           ------------------------------------------------------------
           Browser picks the FIRST format it can play, in order:
             1. WebM with alpha → Chrome, Firefox, Edge, Android
             2. MOV with HEVC alpha → Safari (iOS, macOS)
             3. MP4 (no alpha) → any browser as last resort
           ============================================================ -->
      <video
        id="chromosome-video"
        preload="auto"
        loop
        muted
        playsinline
        webkit-playsinline
        crossorigin="anonymous">
        <source src="assets/videos/chromosome-info.webm" type="video/webm">
        <source src="assets/videos/chromosome-info.mov" type="video/quicktime">
        <source src="assets/videos/chromosome-info.mp4" type="video/mp4">
      </video>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- TARGET ENTITY -->
    <a-entity id="target-0" mindar-image-target="targetIndex: 0">

      <!-- ============================================================
           VIDEO PLANE (using a-entity with custom material so the
           alpha channel of the video is respected).
           ------------------------------------------------------------
           - shader: flat       → no lighting math, true video colors
           - transparent: true  → enable alpha blending
           - alphaTest: 0.01    → discard fully-transparent pixels (avoids
                                  black halo around shapes)
           - side: double       → visible from front and back
           - width / height     → matches your target image aspect ratio
                                  (1747×2450 → ratio 1 : 1.402)
           ============================================================ -->
      <a-entity
        id="ar-video-plane"
        geometry="primitive: plane; width: 1; height: 1.402"
        material="shader: flat; src: #chromosome-video; transparent: true; alphaTest: 0.01; side: double"
        position="0 0 0.01"
        rotation="0 0 0"
        video-handler>
      </a-entity>

      <!-- (Background frame removed so transparency is visible) -->

    </a-entity>
  </a-scene>

  <!-- Floating mute button -->
  <div id="ar-controls" class="hidden">
    <button id="mute-toggle" title="Toggle sound">🔇</button>
  </div>

  <script src="js/app.js"></script>
  <script src="js/video-handler.js"></script>
</body>
</html>
